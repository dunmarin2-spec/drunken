<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐉 찐 4성구 서바이벌: 좀비 폭격기</title>
    <style>
        :root { --matrix-green: #39ff14; --neon-red: #ff003c; --gold: #ffd700; --dark: #000; }
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'DungGeunMo', sans-serif; background: #000; }
        
        .bg-image { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; z-index: 0; 
            filter: brightness(0.8); 
            transition: 0.2s;
        }
        .bg-image.active { filter: grayscale(0%) brightness(1); animation: bloody-flicker 0.1s infinite; }

        .game-wrapper { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        #board { 
            width: 100px; height: 100px; position: relative; 
            background: #000000; 
            border-radius: 50%; 
            border: 6px solid var(--matrix-green); 
            box-shadow: 0 0 30px rgba(57,255,20,0.8), inset 0 0 40px rgba(0,0,0,1); 
            overflow: hidden; 
        }
        
        #ball { 
            position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; 
            border-radius: 50%; transform: translate(-50%, -50%); transition: 0.05s linear;
            background: radial-gradient(circle at 30% 30%, #ffdf00, #ff8c00, #cc3300);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), 0 0 15px rgba(255,140,0,0.8);
            z-index: 20;
        }

        .star { position: absolute; color: #d32f2f; font-size: 22px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); transform: translate(-50%, -50%); }
        .star-1 { top: 32%; left: 32%; }
        .star-2 { top: 32%; left: 68%; }
        .star-3 { top: 68%; left: 32%; }
        .star-4 { top: 68%; left: 68%; }

        .ui-box { margin-top: 50px; text-align: center; }
        #timer { font-size: 4rem; color: #fff; text-shadow: 0 0 15px var(--matrix-green); margin: 0 0 15px 0; }
        .btn-start { padding: 20px 50px; background: rgba(0,0,0,0.8); color: var(--matrix-green); border: 3px solid var(--matrix-green); border-radius: 15px; font-size: 1.5rem; font-family: 'DungGeunMo'; cursor: pointer; transition: 0.1s; box-shadow: 0 0 15px rgba(57,255,20,0.5); }
        .btn-start:active { transform: scale(0.95); background: var(--matrix-green); color: #000; box-shadow: 0 0 25px var(--matrix-green); }
        
        /* 🚨 결과 팝업 */
        #result-popup { display: none; position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; z-index: 100; animation: smash 0.2s forwards; }
        .huge-warning { font-size: 4.5rem; color: var(--neon-red); font-weight: 900; text-shadow: 0 0 20px var(--neon-red), 0 0 50px #000; margin-bottom: 20px; line-height: 1.2; word-break: keep-all; }
        
        .bank-box { background: rgba(0,0,0,0.95); padding: 25px; border-radius: 15px; border: 2px solid #444; display: inline-block; box-shadow: 0 0 30px rgba(255,0,0,0.5); width: 80%; max-width: 300px;}
        .copy-btn { color: var(--gold); cursor: pointer; font-size: 1.2rem; text-decoration: underline; text-shadow: 0 0 5px var(--gold); }

        /* 🚀 상시 노출 쿠팡 배너 스타일 */
        .fixed-banner { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 340px; z-index: 200; 
        }
        .coupang-link { 
            display: block; background: rgba(255, 255, 255, 0.95); border-radius: 12px; 
            padding: 12px; text-decoration: none; border: 2px solid #0073e9; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .coupang-link:active { transform: scale(0.97); }
        .cp-tag { color: #e52528; font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; display: block; font-family: sans-serif; }
        .cp-desc { color: #000; font-size: 0.95rem; font-weight: bold; line-height: 1.3; font-family: sans-serif; }
        .cp-sub { font-size: 0.6rem; color: #666; text-align: center; margin-top: 8px; font-family: sans-serif; line-height: 1.2; }

        @keyframes smash { 0% { transform: translate(-50%, -50%) scale(3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes bloody-flicker { 0% { filter: hue-rotate(0deg) contrast(150%) brightness(0.8) sepia(1) hue-rotate(-50deg) saturate(5); } 100% { filter: hue-rotate(10deg) contrast(200%) brightness(1.2) sepia(1) hue-rotate(-50deg) saturate(5); } }
    </style>
</head>
<body>

    <div id="bg" class="bg-image"></div>

    <div class="game-wrapper">
        <div id="board">
            <div id="ball">
                <span class="star star-1">★</span>
                <span class="star star-2">★</span>
                <span class="star star-3">★</span>
                <span class="star star-4">★</span>
            </div>
        </div>
        
        <div class="ui-box">
            <h1 id="timer">10.0S</h1>
            <button id="start-btn" class="btn-start" onclick="startGame()">테스트 가즈아!</button>
        </div>
    </div>

    <div id="result-popup">
        <div id="result-text" class="huge-warning">경고 :<br>좀비 출현!</div>
        <div class="bank-box">
            <p style="margin:0 0 10px; font-size:1rem; color:#fff;">좀비 하남자는 대리비를 입금하시오.</p>
            <span class="copy-btn" onclick="copyAccount()">케이뱅크 100-210-317446</span>
        </div>
    </div>

    <div class="fixed-banner">
        <a href="https://link.coupang.com/a/ea5vbu" target="_blank" class="coupang-link">
            <span class="cp-tag">형님, 내일 아침 "살고 싶다면" 클릭 🚀</span>
            <div class="cp-desc">좀비 탈출 넘버원! <span style="color:#0073e9;">강력 숙취해소제</span> 특가 👉</div>
        </a>
        <div class="cp-sub">
            이 포스팅은 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받습니다.
        </div>
    </div>

    <script>
        let ball = document.getElementById('ball');
        let timerDisplay = document.getElementById('timer');
        let startBtn = document.getElementById('start-btn');
        let bg = document.getElementById('bg');
        let popup = document.getElementById('result-popup');

        let x = 0, y = 0, timeLeft = 10, isPlaying = false, gameInterval;

        function startGame() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') initGame();
                });
            } else { initGame(); }
        }

        function initGame() {
            if (isPlaying) return;
            isPlaying = true; timeLeft = 10; x = 0; y = 0;
            startBtn.disabled = true;
            popup.style.display = 'none';
            bg.classList.remove('active'); 
            
            ball.style.left = `50%`;
            ball.style.top = `50%`;
            
            window.addEventListener('deviceorientation', handleOrientation);
            
            gameInterval = setInterval(() => {
                timeLeft -= 0.1;
                timerDisplay.innerText = timeLeft.toFixed(1) + "S";
                
                let dist = Math.sqrt(x*x + y*y);
                if (dist > 10) { 
                    endGame(false); 
                }

                if (timeLeft <= 0) {
                    endGame(true);
                }
            }, 100);
        }

        function handleOrientation(e) {
            x = (e.gamma || 0) * 2.5; 
            y = (e.beta || 0) * 2.5;
            
            ball.style.left = `calc(50% + ${x}px)`;
            ball.style.top = `calc(50% + ${y}px)`;
        }

        function endGame(win) {
            isPlaying = false; clearInterval(gameInterval);
            window.removeEventListener('deviceorientation', handleOrientation);
            startBtn.disabled = false;
            
            if (win) {
                timerDisplay.innerText = "😎 생존!";
                timerDisplay.style.color = "#39ff14";
            } else {
                timerDisplay.innerText = "🧟‍♂️ 탈락!";
                timerDisplay.style.color = "#ff003c";
                popup.style.display = 'block'; 
                bg.classList.add('active'); 
                if (navigator.vibrate) navigator.vibrate([1000]); 
            }
        }

        function copyAccount() {
            const acc = "케이뱅크 100-210-317446";
            navigator.clipboard.writeText(acc);
            alert("계좌번호 복사 완료! 형님, 입금 가즈아!\n\n" + acc);
        }
    </script>
</body>
</html>
