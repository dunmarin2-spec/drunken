<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤪 애니메 좀비 판독기 (노-엑박)</title>
    <style>
        :root { --matrix-green: #39ff14; --neon-red: #ff003c; --gold: #ffd700; --dark: #000; }
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'DungGeunMo', sans-serif; background: #000; }
        
        /* 🖼️ 배경: 이미지 대신 60마리 애니메이션 캐릭터 이모지 콜라주 */
        .anime-wall { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around;
            font-size: 2rem; opacity: 0.2; filter: grayscale(100%); z-index: -1; transition: 0.3s;
        }
        .anime-wall.active { opacity: 0.8; filter: grayscale(0%); animation: shake 0.1s infinite; }

        .game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        /* 🌑 형님이 주문하신 블랙홀 원 */
        #board { width: 300px; height: 300px; position: relative; background: #000; border-radius: 50%; border: 5px solid #222; box-shadow: 0 0 50px rgba(0,0,0,1); overflow: hidden; }
        
        /* 🧪 구슬: 이미지 대신 화려한 형광 앰플 이모지 */
        #ball { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; line-height: 50px; font-size: 2.5rem; text-align: center; transform: translate(-50%, -50%); transition: 0.05s linear; filter: drop-shadow(0 0 10px var(--matrix-green)); z-index: 20; }

        #timer { font-size: 3rem; margin: 25px 0; color: #fff; text-shadow: 0 0 10px #000; }
        .btn-start { padding: 20px 50px; background: #111; color: var(--matrix-green); border: 3px solid var(--matrix-green); border-radius: 15px; font-size: 1.5rem; font-family: 'DungGeunMo'; cursor: pointer; box-shadow: 0 0 15px rgba(57,255,20,0.5); }
        .btn-start:active { transform: scale(0.95); background: var(--matrix-green); color: #000; }
        
        #result-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; border: 4px solid var(--neon-red); text-align: center; z-index: 100; animation: pop 0.3s forwards; }
        .result-emoji { font-size: 5rem; margin-bottom: 15px; display: block; }
        .msg { font-size: 1.6rem; font-weight: bold; margin-bottom: 20px; }
        .copy-btn { color: var(--gold); cursor: pointer; font-size: 1.1rem; text-decoration: underline; }

        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(1deg); } }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); } to { translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="anime-wall" class="anime-wall">
        <span>🏃</span><span>🔥</span><span>⚡</span><span>👊</span><span>🏴‍☠️</span><span>🗡️</span><span>🐉</span><span>🏀</span><span>🎾</span><span>⚽</span>
        <span>👒</span><span>🦊</span><span>👹</span><span>👻</span><span>🤖</span><span>👾</span><span>👽</span><span>🦄</span><span>🐱</span><span>🐭</span>
        <span>🐰</span><span>🦊</span><span>🐻</span><span>🐼</span><span>🐨</span><span>🐯</span><span>🦁</span><span>🐮</span><span>🐷</span><span>🐸</span>
        <span>🐵</span><span>🐔</span><span>🐧</span><span>🐦</span><span>🐤</span><span>🦆</span><span>🦅</span><span>🦉</span><span>🦇</span><span>🐺</span>
        <span>🐗</span><span>🐴</span><span>🦄</span><span>🐝</span><span>태</span><span>🦋</span><span>🐌</span><span>🐞</span><span>🐜</span><span>🦗</span>
        <span>🕷️</span><span>🦂</span><span>🐢</span><span>🐍</span><span>🦎</span><span>🐙</span><span>🦑</span><span>🦐</span><span>🦀</span><span>🐡</span>
    </div>

    <div class="game-container">
        <div id="board">
            <div id="ball">🧪</div>
        </div>
        <div id="timer">10.0S</div>
        <button id="start-btn" class="btn-start" onclick="startGame()">테스트 가즈아!</button>
    </div>

    <div id="result-popup">
        <span id="result-emoji" class="result-emoji"></span>
        <div id="result-msg" class="msg"></div>
        <div style="background:#222; padding:15px; border-radius:10px;">
            <p style="margin:0 0 10px; font-size:0.8rem; color:#aaa;">좀비 하남자는 대리비를 입금하시오.</p>
            <span class="copy-btn" onclick="copyAccount()">케이뱅크 100-210-317446</span>
        </div>
    </div>

    <script>
        let ball = document.getElementById('ball');
        let timerDisplay = document.getElementById('timer');
        let startBtn = document.getElementById('start-btn');
        let wall = document.getElementById('anime-wall');
        let popup = document.getElementById('result-popup');
        let resMsg = document.getElementById('result-msg');
        let resEmoji = document.getElementById('result-emoji');

        let x = 0, y = 0, timeLeft = 10, isPlaying = false, gameInterval;

        function startGame() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') initGame();
                });
            } else { initGame(); }
        }

        function initGame() {
            if (isPlaying) return;
            isPlaying = true; timeLeft = 10; x = 0; y = 0;
            startBtn.disabled = true;
            popup.style.display = 'none';
            wall.classList.remove('active');
            window.addEventListener('deviceorientation', handleOrientation);
            
            gameInterval = setInterval(() => {
                timeLeft -= 0.1;
                timerDisplay.innerText = timeLeft.toFixed(1) + "S";
                let dist = Math.sqrt(x*x + y*y);
                if (dist > 130) endGame(false); // 블랙홀(300px) 탈출 시 패배
                if (timeLeft <= 0) endGame(true);
            }, 100);
        }

        function handleOrientation(e) {
            x = e.gamma * 3; y = e.beta * 3;
            ball.style.left = `calc(50% + ${x}px)`;
            ball.style.top = `calc(50% + ${y}px)`;
        }

        function endGame(win) {
            isPlaying = false; clearInterval(gameInterval);
            window.removeEventListener('deviceorientation', handleOrientation);
            startBtn.disabled = false;
            popup.style.display = 'block';
            if (win) {
                resEmoji.innerText = "👨‍💼"; resMsg.innerText = "[인간 인증] 합격!";
                resMsg.style.color = "#39ff14";
            } else {
                resEmoji.innerText = "🧟"; resMsg.innerText = "[음주 좀비] 즉시 처단!";
                resMsg.style.color = "#ff003c";
                wall.classList.add('active'); // 탈락 시 배경 캐릭터들 미친듯이 발광
                if (navigator.vibrate) navigator.vibrate(500);
            }
        }

        function copyAccount() {
            const acc = "케이뱅크 100-210-317446";
            navigator.clipboard.writeText(acc);
            alert("계좌번호 복사 완료!\n\n" + acc);
        }
    </script>
</body>
</html>
