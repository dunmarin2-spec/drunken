<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍺 사이버 좀비 판독기</title>
    <style>
        :root { --neon-green: #39ff14; --neon-red: #ff003c; --dark: #000000; --gold: #ffd700; }
        
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body { 
            /* 🖼️ 배경 이미지: 음산한 네온 술집 (형님이 원하시는 이미지로 교체 가능) */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1549497538-303791108f94?q=80&w=600') no-repeat center center fixed;
            background-size: cover;
            color: #fff; font-family: 'DungGeunMo', sans-serif; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-transform: uppercase;
        }
        
        .container { text-align: center; width: 90%; max-width: 450px; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; border: 4px double var(--neon-green); box-shadow: 0 0 30px rgba(57, 255, 20, 0.4); }
        
        h1 { font-size: 2rem; color: #fff; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); animation: title-flicker 2s infinite; }
        .desc { font-size: 0.9rem; color: #aaa; margin-bottom: 25px; }

        /* 게임 보드 */
        #board { width: 300px; height: 300px; border: 6px solid #222; border-radius: 50%; position: relative; margin: 0 auto; background: rgba(17,17,17,0.8); overflow: hidden; box-shadow: inset 0 0 20px #000; }
        
        /* 중앙 타겟 영역 이미지 */
        #target-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border-radius: 50%; background: url('https://raw.githubusercontent.com/yannick-code/gif-lib/master/target_pulse.gif') center/cover; opacity: 0.6; }
        
        /* 🧪 구슬 이미지: 독극물 앰플 (이걸 이미지로 변경) */
        #ball { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: url('https://i.ibb.co/3sX84Xm/chemical-vial.png') center/cover; transform: translate(-50%, -50%); transition: 0.04s linear; filter: drop-shadow(0 0 10px var(--neon-green)); z-index: 10; }

        /* 타이머 & 버튼 */
        #timer { font-size: 3rem; margin: 15px 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.7); }
        .btn-start { width: 100%; padding: 18px; background: #222; color: var(--neon-green); border: 3px solid var(--neon-green); border-radius: 10px; font-size: 1.4rem; font-family: 'DungGeunMo', sans-serif; cursor: pointer; transition: 0.1s; box-shadow: 0 0 15px rgba(57, 255, 20, 0.5); }
        .btn-start:active { background: var(--neon-green); color: #000; box-shadow: 0 0 25px var(--neon-green); }
        .btn-start:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        /* 결과 팝업 */
        #result-popup { display: none; margin-top: 20px; animation: scaleIn 0.3s forwards; text-align: center; }
        
        /* 🖼️ 결과 이미지 (합격/탈락) */
        #result-img { width: 80px; height: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #fff); }
        .msg { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* 후원 섹션 */
        .bank-box { background: #111; padding: 15px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #333; position: relative; }
        
        /* 🖼️ 후원 황금 아이콘 이미지 */
        .donate-icon { position: absolute; top: -15px; left: -15px; width: 40px; height: 40px; background: url('https://i.ibb.co/wMs991h/gold-coin.png') center/cover; }
        
        .copy-btn { color: var(--gold); cursor: pointer; font-weight: bold; text-shadow: 0 0 5px rgba(255,215,0,0.5); font-size: 1rem; }

        /* 애니메이션 */
        @keyframes title-flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 22%, 24%, 55% { opacity: 0.5; } }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍺 좀비 판독기</h1>
        <p class="desc">10초간 시약을 타겟 중앙에 가두십시오.</p>

        <div id="board">
            <div id="target-area"></div>
            <div id="ball"></div>
        </div>

        <div id="timer">10.0s</div>
        <button id="start-btn" class="btn-start" onclick="startGame()">테스트 가즈아!</button>

        <div id="result-popup">
            <img id="result-img" src="" alt="결과 이미지">
            <div id="result-msg" class="msg"></div>
            <div class="bank-box">
                <div class="donate-icon"></div> <p style="margin: 0 0 10px;">좀비로 판명된 하남자는 대리비를 입금하시오.</p>
                <span class="copy-btn" onclick="copyAccount()">케이뱅크 100-210-317446</span>
            </div>
        </div>
    </div>

    <script>
        let ball = document.getElementById('ball');
        let timerDisplay = document.getElementById('timer');
        let startBtn = document.getElementById('start-btn');
        let resultPopup = document.getElementById('result-popup');
        let resultMsg = document.getElementById('result-msg');
        let resultImg = document.getElementById('result-img');

        // 🖼️ 결과 이미지 URL 세팅
        const SUCCESS_IMG = "https://i.ibb.co/v44m5Yg/success-stamp.png"; // 인간 인증 도장
        const FAIL_IMG = "https://i.ibb.co/M9B7X25/zombie-icon.png"; // 좀비 아이콘

        let x = 0, y = 0; 
        let timeLeft = 10;
        let isPlaying = false;
        let gameInterval;

        function startGame() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initGame();
                        }
                    })
                    .catch(console.error);
            } else {
                initGame();
            }
        }

        function initGame() {
            if (isPlaying) return;
            isPlaying = true;
            timeLeft = 10;
            x = 0; y = 0;
            startBtn.disabled = true;
            resultPopup.style.display = 'none';
            ball.style.background = "url('https://i.ibb.co/3sX84Xm/chemical-vial.png') center/cover"; // 시약 이미지
            
            window.addEventListener('deviceorientation', handleOrientation);
            
            gameInterval = setInterval(() => {
                timeLeft -= 0.1;
                timerDisplay.innerText = timeLeft.toFixed(1) + "s";

                let distance = Math.sqrt(x*x + y*y);
                if (distance > 35) { // 감도 빡세게 (시약이 탈출하면 탈락)
                    endGame(false);
                }

                if (timeLeft <= 0) {
                    endGame(true);
                }
            }, 100);
        }

        function handleOrientation(event) {
            // 자이로 센서 데이터 받기
            let moveX = event.gamma * 2; 
            let moveY = event.beta * 2;

            x = moveX;
            y = moveY;

            // 시약 위치 이동 (부드럽게 이미지 업데이트)
            ball.style.left = `calc(50% + ${x}px)`;
            ball.style.top = `calc(50% + ${y}px)`;
        }

        function endGame(isSuccess) {
            isPlaying = false;
            clearInterval(gameInterval);
            window.removeEventListener('deviceorientation', handleOrientation);
            startBtn.disabled = false;
            timerDisplay.innerText = "10.0s";

            resultPopup.style.display = 'block';
            if (isSuccess) {
                resultImg.src = SUCCESS_IMG;
                resultMsg.innerText = "[인간 인증] 합격!";
                resultMsg.style.color = "#39ff14";
            } else {
                resultImg.src = FAIL_IMG;
                resultMsg.innerText = "[음주 좀비] 즉시 처단!";
                resultMsg.style.color = "#ff003c";
                // 탈락 시 시약 이미지를 깨진 걸로 교체 (형님이 이미지 준비되면)
                ball.style.background = "url('https://i.ibb.co/v44m5Yg/success-stamp.png') center/cover"; // 폰트 도장으로 대동강
                if (navigator.vibrate) navigator.vibrate(500);
            }
        }

        function copyAccount() {
            const acc = "케이뱅크 100-210-317446";
            navigator.clipboard.writeText(acc);
            alert("계좌번호 복사 완료! 형님, 대리비 입금 가즈아!\n\n" + acc);
        }
    </script>
</body>
</html>
